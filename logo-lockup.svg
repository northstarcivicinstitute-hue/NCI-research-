# Community Equity Lab GitHub site package

A GitHub-ready static site package for Community Equity Lab positioned as a program of NCI.

## Included pages
- `index.html` — homepage hero with logo and recommended brand hierarchy
- `about.html` — program relationship to NCI and 40-word description
- `initiatives.html` — initiative landing page with separate Lab and NCI download paths
- `briefs.html` — byline format, evidence excerpts, and brief placement guidance
- `contact.html` — contact routing using Donavan@nciresearch.org
- `POSITIONING-GUIDE.md` — internal notes and exact copy blocks

## Included assets
- `assets/logo-mark.svg` — web-ready vector mark based on the uploaded logo
- `assets/logo-lockup.svg` — web-ready vector lockup based on the uploaded logo
- `assets/favicon.svg` — browser tab icon
- `assets/styles.css` — shared styling

## Included downloads
Each initiative has placeholder download files so the buttons work immediately on GitHub Pages:
- Friendship Games toolkit and technical appendix
- Section 31aa toolkit and technical appendix
- HB4371 toolkit and technical appendix

## Publish on GitHub Pages
1. Upload the folder contents to your GitHub repository.
2. In GitHub, open **Settings > Pages**.
3. Set the source to the branch and root folder you uploaded.
4. Save.

## Quick edits before publishing
- Swap `Donavan@nciresearch.org` if you want separate inboxes for NCI and Community Equity Lab.
- Replace placeholder initiative download files in `downloads/` with your real PDFs, docs, or briefs.
- If you have the original exported logo, you can replace the SVG files in `assets/`.

## Notes
The logo assets included here are vector recreations based on the logo image you shared, optimized for web use.
