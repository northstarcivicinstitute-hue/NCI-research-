<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 620" role="img" aria-labelledby="title desc">
  <title id="title">Community Equity Lab logo</title>
  <desc id="desc">Community Equity Lab wordmark with compass-like icon.</desc>
  <defs>
    <style>
      .bg { fill: #062f36; }
      .cream { fill: #f1e8d8; }
      .teal { fill: #1297a6; }
      .gold { fill: #f0b414; }
      .coral { fill: #f25b2e; }
      .ring { stroke: #f1e8d8; stroke-width: 20; fill: none; }
      .word { fill: #f1e8d8; font-family: Arial, Helvetica, sans-serif; font-weight: 800; letter-spacing: 4px; }
      .sub { fill: #f1e8d8; font-family: Arial, Helvetica, sans-serif; font-weight: 600; letter-spacing: 1px; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1400" height="620" rx="40"/>
  <g transform="translate(120,35)">
    <circle class="ring" cx="200" cy="170" r="145"/>
    <rect x="0" y="159" width="92" height="20" class="cream" rx="8"/>
    <rect x="308" y="159" width="92" height="20" class="cream" rx="8"/>
    <polygon class="teal" points="20,182 200,152 140,288"/>
    <polygon class="coral" points="200,152 300,66 242,194"/>
    <polygon class="gold" points="200,152 392,182 224,218 194,412 170,216 132,202"/>
    <polygon class="cream" points="200,0 224,124 200,112 176,124"/>
  </g>
  <text x="540" y="245" class="word" font-size="108">COMMUNITY</text>
  <text x="540" y="362" class="word" font-size="108">EQUITY LAB</text>
  <text x="540" y="472" class="sub" font-size="52">Empowering Communities Through Safe Civic Engagement.</text>
</svg>
