<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="title desc">
  <title id="title">Community Equity Lab mark</title>
  <desc id="desc">Three overlapping circles forming a community symbol on a navy rounded square with gold accents.</desc>
  <rect width="120" height="120" rx="26" fill="#1B2A4A"/>
  <!-- Three overlapping community circles -->
  <circle cx="48" cy="50" r="22" fill="none" stroke="#C5A55A" stroke-width="2.5" opacity=".4"/>
  <circle cx="72" cy="50" r="22" fill="none" stroke="#C5A55A" stroke-width="2.5" opacity=".4"/>
  <circle cx="60" cy="70" r="22" fill="none" stroke="#C5A55A" stroke-width="2.5" opacity=".4"/>
  <!-- Center intersection highlight -->
  <circle cx="60" cy="57" r="8" fill="#C5A55A" opacity=".9"/>
  <!-- Small north star accent at top -->
  <path d="M60 16 L62 24 L70 26 L62 28 L60 36 L58 28 L50 26 L58 24 Z" fill="#C5A55A" opacity=".6"/>
</svg>
